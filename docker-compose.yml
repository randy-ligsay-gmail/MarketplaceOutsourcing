services:
  postgres:
    image: postgres:16
    container_name: marketplace-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace_outsourcing
    ports:
      - "5432:5432"
    volumes:
      - marketplace_pg_data:/var/lib/postgresql/data

volumes:
  marketplace_pg_data:
